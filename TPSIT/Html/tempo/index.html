        <h4>Orario attuale <h4 id="orario"></h4> </h4>

    <h1>Sveglia</h1>

    <div class="form-cont">
        <form id="sveglia-form">
            <input type="time" id="time-input" min="00:00:00" max="23:59:59" step="1" value="00:00" required>
            <input type="text" id="titolo">
            <input type="submit" value="Imposta">

    <div>

        <ul class="sveglie-lista"></ul>
    </div>
</body>
