<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Registrazione a Hogwarts</title>
  <script src="Valida2.js"></script>
  <style>
    body {
      font-family: 'Georgia', serif;
      background: url('https://wallpapers.com/images/hd/harry-potter-profile-pictures-1920-x-1080-lclkc1d42ge66s0i.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #f5deb3;
      padding: 20px;
    }
    h2 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 20px;
      color: #ffd700;
      text-shadow: 2px 2px 4px #000;
    }
    form {
      background: rgba(0, 0, 0, 0.8);
      padding: 25px;
      border-radius: 15px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
      color: #ffcc00;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #444;
      border-radius: 5px;
      font-size: 14px;
      background-color: #2f2f2f;
      color: #fff;
    }
    .errore {
      color: #ff6666;
      font-size: 13px;
      margin-top: 3px;
    }
    button {
      background: #800000;
      color: white;
      cursor: pointer;
      margin-top: 20px;
      font-weight: bold;
    }
    button:hover {
      background: #b30000;
    }

    .libri-section {
      margin-top: 20px;
      border-top: 1px solid #555;
      padding-top: 20px;
    }
  </style>
</head>
<body>

  <h2>Modulo di Registrazione - Hogwarts</h2>

  <form id="formRegistrazione" novalidate>
    <label for="nome">Nome (Magico):</label>
    <input type="text" id="nome" name="nome" required>
    <div class="errore" id="errNome"></div>

    <label for="cognome">Cognome:</label>
    <input type="text" id="cognome" name="cognome" required>
    <div class="errore" id="errCognome"></div>

    <label for="email">Gufo-Mail:</label>
    <input type="email" id="email" name="email" required>
    <div class="errore" id="errEmail"></div>

    <label for="password">Incantesimo Segreto (Password):</label>
    <input type="password" id="password" name="password" required>
    <div class="errore" id="errPassword"></div>

    <label for="confermaPassword">Conferma Incantesimo:</label>
    <input type="password" id="confermaPassword" name="confermaPassword" required>
    <div class="errore" id="errConferma"></div>

    <label for="genere">Genere:</label>
    <select id="genere" name="genere" required>
      <option value="">-- Seleziona --</option>
      <option value="maschio">Maschio</option>
      <option value="femmina">Femmina</option>
      <option value="altro">Altro</option>
    </select>
    <div class="errore" id="errGenere"></div>

    <label for="dataNascita">Data di Nascita (per il Cappello Parlante):</label>
    <input type="date" id="dataNascita" name="dataNascita" required>
    <div class="errore" id="errData"></div>

    <div class="libri-section">
      <h3 style="color:#ffd700;">Acquisto Libri Magici</h3>

      <label for="libro">Scegli il tuo libro:</label>
      <select id="libro" name="libro">
        <option value="">-- Seleziona un libro --</option>
        <option value="HP1">Harry Potter e la Pietra Filosofale</option>
        <option value="HP2">Harry Potter e la Camera dei Segreti</option>
        <option value="HP3">Harry Potter e il Prigioniero di Azkaban</option>
        <option value="HP4">Harry Potter e il Calice di Fuoco</option>
        <option value="HP5">Harry Potter e l’Ordine della Fenice</option>
        <option value="HP6">Harry Potter e il Principe Mezzosangue</option>
        <option value="HP7">Harry Potter e i Doni della Morte</option>
      </select>

      <label for="quantita">Quanti volumi vuoi acquistare?</label>
      <input type="number" id="quantita" name="quantita" min="1" max="7" value="1">
    </div>

    <button type="submit" onclick="valida2()">Iscriviti a Hogwarts!</button>
  </form>

</body>
<script>
    function valida2() {
        event.preventDefault();

        let nome = document.getElementById('nome').value;
        let email = document.getElementById('email').value;
        let quantita = document.getElementById('quantita').value;

        if (!nome || nome.length < 2) {
            document.getElementById("errNome").innerText = "Inserisci un nome valido!";
            return false;
        }

        if (!email.includes("@")) {
            document.getElementById("errEmail").innerText = "Gufo-Mail non valida!";
            return false;
        }

        alert(`Benvenuto/a ${nome}! Hai ordinato ${quantita} libro/i. Un gufo ti contatterà presto.`);
    }

</script>
</html>
